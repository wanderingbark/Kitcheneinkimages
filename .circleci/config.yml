# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#jobs-overview & https://circleci.com/docs/reference/configuration-reference/#jobs
jobs:
  Hello-World:
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Saying Hello
          command: |
            echo 'Hello World!'
            echo 'This is the delivery pipeline'
  # fetching code from the repo
  Fetch-Code:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Getting the Code
          command: |
            ls -al
            echo '^^^Your repo files^^^'
  Renew-Image: 
    docker:
      - image: cimg/base:current
    steps:
      - run:
          name: Renewing Panel Image
          command: |
            cp DinnerPanel.png testoutput.png
  Commit-Changes:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - add_ssh_keys:
          fingerprints:
            - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO5Gs08GZMcQUrtKG+0HxvHB9TLm8YQX7BXcyaaMCZew wanderingbark@gmail.com"
      - run:
          name: Committing Changes to Repo
          command: |
            git config user.email "wanderingbark@gmail.com"
            git config user.name "CircleCI Job"
            git add .
            git commit --allow-empty -m "Automatic commit from CircleCI [skip ci]"
            git push origin HEAD
    
# Orchestrate jobs using workflows
# See: https://circleci.com/docs/guides/orchestrate/workflows/ & https://circleci.com/docs/reference/configuration-reference/#workflows
workflows:
  Test1: # This is the name of the workflow, feel free to change it to better match your workflow.
    # Inside the workflow, you define the jobs you want to run.
    jobs:
      - Hello-World
      - Fetch-Code
      - Renew-Image
      - Commit-Changes
