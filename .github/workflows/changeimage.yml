name: Update Image By Time
#on:
#  schedule:
#    - cron: '0 12 * * *' # Runs at 08:00 UTC
#    - cron: '0 23 * * *' # Runs at 20:00 UTC

on: push

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Image
        run: |
          HOUR=$(date +%H)
          if [ $HOUR -lt 16 ]; then
            cp BreakfastPanel.png currentoutput.png
          else
            cp DinnerPanel.png currentoutput.png
          fi
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add currentoutput.png
          git commit -m "Update image based on time"
          git push
          echo test, and deploy your project.
