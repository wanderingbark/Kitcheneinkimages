name: Update Image By Time of Day

on:
  schedule:
#    - cron: '13 2,5,13,18,21,23 * * *' 
    - cron: '13 2 * * *'
    - cron: '13 5 * * *'
    - cron: '13 13 * * *'
    - cron: '13 18 * * *'
    - cron: '13 21 * * *'
    - cron: '13 23 * * *'
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Image
        run: |
          HOUR=$(date +%H)
          if [ $HOUR -lt 2 ]; then
            cp DinnerPanel.png currentoutput.png
          elif [ $HOUR -lt 5 ]; then
            cp LateNightSnackPanel.png currentoutput.png
          elif [ $HOUR -lt 13 ]; then
            cp BedTimePanel.png currentoutput.png
          elif [ $HOUR -lt 18 ]; then
            cp BreakfastPanel.png currentoutput.png
          elif [ $HOUR -lt 21 ]; then
            cp LunchPanel.png currentoutput.png
          elif [ $HOUR -lt 23 ]; then
            cp SnackPanel.png currentoutput.png
          else
            cp Dinnerpanel.png currentoutput.png
          fi
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add currentoutput.png
          git commit -m "Update image based on time"
          git push
          echo test, and deploy your project.
